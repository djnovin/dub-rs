<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Gradient overlay -->
  <defs>
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Dub logo icon (simplified) -->
  <circle cx="600" cy="240" r="60" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="600" cy="240" r="45" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="600" cy="240" r="30" fill="#8B5CF6"/>
  
  <!-- Main text -->
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle">
    dub-rs
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a0a0a0" text-anchor="middle">
    Type-safe Rust SDK for Dub.co
  </text>
  
  <!-- Features badges -->
  <g transform="translate(350, 460)">
    <rect width="120" height="36" rx="18" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="60" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#8B5CF6" text-anchor="middle">
      100% Coverage
    </text>
  </g>
  
  <g transform="translate(490, 460)">
    <rect width="100" height="36" rx="18" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="50" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#10B981" text-anchor="middle">
      Type-safe
    </text>
  </g>
  
  <g transform="translate(610, 460)">
    <rect width="100" height="36" rx="18" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="50" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#F59E0B" text-anchor="middle">
      161+ Tests
    </text>
  </g>
  
  <g transform="translate(730, 460)">
    <rect width="120" height="36" rx="18" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="60" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#EF4444" text-anchor="middle">
      Zero Warnings
    </text>
  </g>
  
  <!-- Bottom text -->
  <text x="600" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#666666" text-anchor="middle">
    Open-source • MIT Licensed • Production Ready
  </text>
</svg>
